<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradFull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A4FF3C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6DC200;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Main badge body -->
  <path d="M 50 70 L 50 100 Q 50 130 70 135 L 130 135 Q 150 130 150 100 L 150 70 Q 150 50 130 50 L 70 50 Q 50 50 50 70" fill="url(#gradFull)" stroke="none"/>

